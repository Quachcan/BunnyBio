<!DOCTYPE html>
<html lang="vi">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Link tới file giao diện của bạn -->

<body>

    <div id="particles-js"></div>

    <div class="container">
        <!-- Header -->

        <div class="subtitle">Bunny sly</div>

        <div class="avatar-wrapper">
            <img src="images/Avatar.jpg" alt="Bunny Profile">
        </div>
        <div class="talks-text">TALKS</div>

        <!-- Links -->
        <div class="links-container">
            <a href="https://www.facebook.com/profile.php?id=61583368815421" class="link-btn" target="_blank">

            </a>

            <a href="https://www.instagram.com/_bunny.sly_" class="link-btn" target="_blank">

            </a>
            
            <a href="https://x.com/tits_2104" class="link-btn" target="_blank">

            </a>

            <a href="https://discord.gg/w6kS7fzHC" class="link-btn" target="_blank">

            </a>

            <a href="https://ganknow.com/bunnytits" class="link-btn" target="_blank">

            <div class="qr-container" id="qrSection">

                </div>
